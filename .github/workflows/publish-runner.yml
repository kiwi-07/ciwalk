name: Publish runner image

on:
  push:
    branches: [develop, main]
    paths:
      - Dockerfile.runner
      - .github/workflows/publish-runner.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          # Local/default name + GHCR for remote pullers
          docker build -f Dockerfile.runner -t ciwalk-runner:latest \
            -t ghcr.io/kiwi-07/ciwalk-runner:latest \
            -t "ghcr.io/kiwi-07/ciwalk-runner:${{ github.sha }}" .
          docker push ghcr.io/kiwi-07/ciwalk-runner:latest
          docker push "ghcr.io/kiwi-07/ciwalk-runner:${{ github.sha }}"
